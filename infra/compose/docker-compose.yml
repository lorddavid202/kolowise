services:
  postgres:
    image: postgres:16-alpine
    container_name: kolowise_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kolowise
    ports:
      - "5433:5432"
    volumes:
      - kolowise_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kolowise"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: kolowise_redis
    ports:
      - "6379:6379"
    volumes:
      - kolowise_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  kolowise_postgres_data:
  kolowise_redis_data: